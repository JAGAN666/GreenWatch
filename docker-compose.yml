services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: greenwatch
      POSTGRES_PASSWORD: greenwatch
      POSTGRES_DB: greenwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  scoring:
    build: ./scoring
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://greenwatch:greenwatch@db:5432/greenwatch
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./scoring:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://greenwatch:greenwatch@db:5432/greenwatch
      DIRECT_URL: postgresql://greenwatch:greenwatch@db:5432/greenwatch
      SCORING_SERVICE_URL: http://scoring:8000
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - scoring

volumes:
  pgdata:
